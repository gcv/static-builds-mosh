on:
  workflow_dispatch:
name: Auto-Build
env:
  MOSH_TAG: 1.4.0
jobs:
  macports-cache:
    runs-on: macos-15-intel
    steps:
      - uses: actions/checkout@v4
      
      - name: Install gtar sudo wrapper
        run: | 
          sudo mv /usr/local/bin/gtar /usr/local/bin/gtar.orig
          sudo cp macOS/gtar /usr/local/bin/gtar
          sudo chmod +x /usr/local/bin/gtar

      - name: Cache macports
        id: cache-macports
        uses: actions/cache@v4
        env:
          cache-name: cache-macports
        with:
          path: /opt/local
          key: ${{ runner.os }}-build-${{ env.cache-name }}-${{ hashFiles('macOS/port-deps.sh') }}
          restore-keys: |
            ${{ runner.os }}-build-${{ env.cache-name }}-
            ${{ runner.os }}-build-
            ${{ runner.os }}-
      
      - name: Setup macports dependencies
        if: steps.cache-macports.outputs.cache-hit != 'true'
        run: | 
          curl -L "https://github.com/macports/macports-base/releases/download/v2.12.3/MacPorts-2.12.3-15-Sequoia.pkg" --output macports.pkg
          sudo installer -pkg macports.pkg -target /
          chmod +x macOS/port-deps.sh && ./macOS/port-deps.sh
  
  linux-build:
    name: Linux Build
    runs-on: ubuntu-24.04

    strategy:
      matrix:
        architecture: [amd64, arm64, armv7]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Build container for ${{ matrix.architecture }}
        run: | 
          docker build -t builder --build-arg TARGET_ARCH=${{ matrix.architecture }} .

      - run: git clone --depth=1 --branch mosh-$MOSH_TAG https://github.com/mobile-shell/mosh.git mosh

      - name: Build binaries for ${{ matrix.architecture }}
        run: docker run -v $PWD/mosh:/mosh -w /mosh --name=builder builder sh -c 'git config --global --add safe.directory /mosh && git describe --dirty --always && ./autogen.sh && LDFLAGS=-static ./configure && make V=1'

      - name: Test run mosh-server
        run: docker run -v $PWD/mosh:/mosh -w /mosh/src/frontend builder sh -c 'chmod +x mosh-server && ./mosh-server'

      - name: Create bundle
        run: |
          bundle="mosh-${MOSH_TAG}-linux-${{ matrix.architecture }}"
          mkdir -p "dist/${bundle}"
          install -m 755 mosh/scripts/mosh "dist/${bundle}/mosh"
          install -m 755 mosh/src/frontend/mosh-client "dist/${bundle}/mosh-client"
          install -m 755 mosh/src/frontend/mosh-server "dist/${bundle}/mosh-server"
          tar -C dist -czf "dist/${bundle}.tar.gz" "${bundle}"

      - uses: actions/upload-artifact@v4
        with:
          name: mosh-${{ env.MOSH_TAG }}-linux-${{ matrix.architecture }}
          path: dist/mosh-${{ env.MOSH_TAG }}-linux-${{ matrix.architecture }}.tar.gz
          if-no-files-found: error

      - name: Verify bundle contents
        run: |
          # Ensure the bundle contains the expected executables with stable names.
          tar -tzf dist/mosh-${MOSH_TAG}-linux-${{ matrix.architecture }}.tar.gz | grep -Fx "mosh-${MOSH_TAG}-linux-${{ matrix.architecture }}/mosh"
          tar -tzf dist/mosh-${MOSH_TAG}-linux-${{ matrix.architecture }}.tar.gz | grep -Fx "mosh-${MOSH_TAG}-linux-${{ matrix.architecture }}/mosh-client"
          tar -tzf dist/mosh-${MOSH_TAG}-linux-${{ matrix.architecture }}.tar.gz | grep -Fx "mosh-${MOSH_TAG}-linux-${{ matrix.architecture }}/mosh-server"
  
  macos-build:
    name: macOS Build (x86_64, arm64)
    needs: macports-cache
    runs-on: macos-15-intel

    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Install gtar sudo wrapper
        run: | 
          sudo mv /usr/local/bin/gtar /usr/local/bin/gtar.orig
          sudo cp macOS/gtar /usr/local/bin/gtar
          sudo chmod +x /usr/local/bin/gtar

      - name: Restore macports cache
        id: cache-macports
        uses: actions/cache@v4
        env:
          cache-name: cache-macports
        with:
          path: /opt/local
          key: ${{ runner.os }}-build-${{ env.cache-name }}-${{ hashFiles('macOS/port-deps.sh') }}
          restore-keys: |
            ${{ runner.os }}-build-${{ env.cache-name }}-
            ${{ runner.os }}-build-
            ${{ runner.os }}-

      - run: git clone --depth=1 --branch mosh-$MOSH_TAG https://github.com/mobile-shell/mosh.git mosh
      
      - run: PATH=/opt/local/bin:$PATH ./autogen.sh
        working-directory: ./mosh

      - run: |
          chmod +x build.sh
          env MOSH_TAG=$MOSH_TAG ZERO_AR_DATE=1 MACOSX_DEPLOYMENT_TARGET=11.0 PATH=/opt/local/bin:$PATH ./build.sh
        working-directory: ./macOS

      - name: Create bundle for x86_64
        run: |
          bundle="mosh-${MOSH_TAG}-darwin-x86_64"
          mkdir -p "dist/${bundle}"
          install -m 755 ./macOS/prefix_x86_64/local/bin/mosh "dist/${bundle}/mosh"
          install -m 755 ./macOS/prefix_x86_64/local/bin/mosh-client "dist/${bundle}/mosh-client"
          install -m 755 ./macOS/prefix_x86_64/local/bin/mosh-server "dist/${bundle}/mosh-server"
          tar -C dist -czf "dist/${bundle}.tar.gz" "${bundle}"

      - name: Create bundle for arm64
        run: |
          bundle="mosh-${MOSH_TAG}-darwin-arm64"
          mkdir -p "dist/${bundle}"
          install -m 755 ./macOS/prefix_arm64/local/bin/mosh "dist/${bundle}/mosh"
          install -m 755 ./macOS/prefix_arm64/local/bin/mosh-client "dist/${bundle}/mosh-client"
          install -m 755 ./macOS/prefix_arm64/local/bin/mosh-server "dist/${bundle}/mosh-server"
          tar -C dist -czf "dist/${bundle}.tar.gz" "${bundle}"

      - name: Verify macOS bundles
        run: |
          for arch in x86_64 arm64; do
            bundle="dist/mosh-${MOSH_TAG}-darwin-${arch}.tar.gz"
            tar -tzf "${bundle}" | grep -Fx "mosh-${MOSH_TAG}-darwin-${arch}/mosh"
            tar -tzf "${bundle}" | grep -Fx "mosh-${MOSH_TAG}-darwin-${arch}/mosh-client"
            tar -tzf "${bundle}" | grep -Fx "mosh-${MOSH_TAG}-darwin-${arch}/mosh-server"
          done

      - uses: actions/upload-artifact@v4
        with:
          name: mosh-${{ env.MOSH_TAG }}-darwin-x86_64
          path: ./dist/mosh-${{ env.MOSH_TAG }}-darwin-x86_64.tar.gz
          if-no-files-found: error

      - uses: actions/upload-artifact@v4
        with:
          name: mosh-${{ env.MOSH_TAG }}-darwin-arm64
          path: ./dist/mosh-${{ env.MOSH_TAG }}-darwin-arm64.tar.gz
          if-no-files-found: error

  release:
    name: Release
    needs: [linux-build, macos-build]
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      
      - name: Create release description
        run: |
          (
            echo '- [Workflow file](https://github.com/${{ github.repository }}/blob/${{ github.sha }}/.github/workflows/autobuild.yml)'
            echo
            echo '## Files'
            echo '```'
            (
              for bundle in dist/mosh-*.tar.gz; do
                echo "$(basename "$bundle")"
                tar -tzf "$bundle"
                tmpdir=$(mktemp -d)
                tar -xzf "$bundle" -C "$tmpdir"
                file "$tmpdir"/*/*
                rm -rf "$tmpdir"
                echo
              done
            )
            echo '```'
            echo
            echo '## SHA256 Checksums'
            echo '```'
            (
              for bundle in dist/mosh-*.tar.gz; do
                sha256sum "$bundle"
              done
            )
            echo '```'
          ) | tee release.md
      
      - id: upload_artifact
        uses: actions/upload-artifact@v4
        with:
          name: release.md
          path: release.md
          if-no-files-found: error

      - name: Create release
        id: create_release
        uses: softprops/action-gh-release@v1
        with:
          name: "${{ env.MOSH_TAG }}"
          tag_name: ${{ env.MOSH_TAG }}
          prerelease: false
          draft: false
          body_path: release.md
          files: |
            dist/mosh-*.tar.gz
